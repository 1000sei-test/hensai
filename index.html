<!DOCTYPE html>

<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>返済チェックシート</title>

/* Header */
.header {
  background: #fff;
  border-bottom: 1px solid #e8e4de;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 1px 12px rgba(0,0,0,0.04);
}
.header-inner {
  max-width: 560px; margin: 0 auto;
  padding: 14px 20px;
  display: flex; align-items: center; justify-content: space-between;
}
.header-label {
  font-size: 10px; color: #b5a898; font-weight: 500;
  letter-spacing: 2.5px; text-transform: uppercase;
}
.header-title {
  font-family: 'DM Serif Display', serif;
  font-size: 22px; color: #2a2825; margin-top: 1px;
}
.year-selector {
  display: flex; align-items: center; gap: 6px;
  background: #f5f3ef; border-radius: 10px; padding: 6px 10px;
  border: 1px solid #e8e4de;
}
.year-btn {
  background: none; border: none; color: #b5a898;
  cursor: pointer; font-size: 18px; line-height: 1;
  padding: 0 2px; transition: color 0.15s;
}
.year-btn:hover { color: #6b8f71; }
.year-text { font-size: 14px; font-weight: 700; min-width: 38px; text-align: center; color: #2a2825; }

/* Main */
main { max-width: 560px; margin: 0 auto; padding: 20px 16px; }

/* Summary card */
.summary-card {
  background: #fff; border: 1px solid #e8e4de; border-radius: 20px;
  padding: 22px 20px; margin-bottom: 16px;
  display: flex; align-items: center; gap: 20px;
  box-shadow: 0 2px 16px rgba(0,0,0,0.04);
}
.summary-ring { position: relative; display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; }
.ring-svg { transform: rotate(-90deg); }
.ring-bg { fill: none; stroke: #ede9e3; stroke-width: 6; }
.ring-fg { fill: none; stroke-width: 6; stroke-linecap: round; transition: stroke-dashoffset 0.8s cubic-bezier(.4,0,.2,1); }
.ring-label { position: absolute; text-align: center; font-size: 14px; font-weight: 700; color: #2a2825; }
.summary-info { flex: 1; min-width: 0; }
.summary-year { color: #b5a898; font-size: 11px; margin-bottom: 6px; }
.summary-amount-label { color: #7a9e80; font-size: 12px; font-weight: 500; }
.summary-amount-value { font-size: 22px; font-weight: 700; color: #2a2825; display: block; margin-top: 1px; margin-bottom: 2px; }
.summary-amount-total { color: #c8c0b5; font-size: 12px; margin-bottom: 10px; display: block; }
.tags { display: flex; gap: 5px; flex-wrap: wrap; }
.tag { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 500; }

/* Loan card */
.loan-card {
  background: #fff; border-radius: 16px; padding: 18px 18px 14px; margin-bottom: 10px;
  border: 1px solid #e8e4de; box-shadow: 0 1px 8px rgba(0,0,0,0.03);
  transition: box-shadow 0.2s, border-color 0.2s;
}
.loan-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.07); border-color: #d8d2ca; }
.loan-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
.loan-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
.loan-name-row { display: flex; align-items: flex-start; gap: 8px; }
.loan-name { font-weight: 700; font-size: 15px; color: #2a2825; }
.loan-amount { font-size: 13px; margin-top: 2px; padding-left: 17px; color: #9a9288; }
.loan-amount-value { font-weight: 700; font-size: 14px; }
.loan-meta { display: flex; align-items: center; gap: 8px; }
.loan-count { font-size: 11px; color: #c8c0b5; white-space: nowrap; }
.loan-remove { background: none; border: none; color: #d8d2ca; cursor: pointer; font-size: 18px; line-height: 1; padding: 2px 4px; transition: color 0.15s; }
.loan-remove:hover { color: #e07070; }

/* Month grid */
.month-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; }
.month-cell { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.month-label { font-size: 10px; color: #c8c0b5; letter-spacing: 0.2px; }
.check-btn {
  width: 38px; height: 38px; border-radius: 10px; border: 1.5px solid;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 16px; background: transparent; flex-shrink: 0;
  transition: all 0.18s cubic-bezier(0.34,1.56,0.64,1);
}
.check-btn:hover { transform: scale(1.12); }
.check-btn.pop { animation: pop 0.36s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes pop {
  0%   { transform: scale(1); }
  50%  { transform: scale(1.35); }
  100% { transform: scale(1); }
}

/* Progress bar */
.progress-bg { background: #f0ece6; border-radius: 4px; height: 3px; width: 100%; margin-top: 12px; }
.progress-fill { height: 3px; border-radius: 4px; transition: width 0.5s ease; }

/* Add panel */
.add-panel {
  background: #fff; border: 1.5px dashed #c8e0cc;
  border-radius: 16px; padding: 20px; margin-bottom: 10px;
}
.add-panel-title { font-weight: 700; font-size: 14px; margin-bottom: 14px; color: #2a2825; }
.add-fields { display: flex; flex-direction: column; gap: 9px; }
.add-fields input {
  background: #f9f7f4; border: 1px solid #e0dbd3; border-radius: 10px;
  color: #2a2825; padding: 10px 14px; font-size: 14px;
  font-family: inherit; outline: none; width: 100%;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.add-fields input:focus { border-color: #7a9e80; box-shadow: 0 0 0 3px rgba(122,158,128,0.12); }
.add-fields input::placeholder { color: #c8c0b5; }
.add-btns { display: flex; gap: 8px; }
.btn {
  border: none; border-radius: 10px; padding: 10px 20px;
  font-size: 13px; font-weight: 700; cursor: pointer;
  font-family: inherit; transition: all 0.18s;
}
.btn:hover { transform: translateY(-1px); }
.btn:active { transform: translateY(0); }
.btn-primary { background: #6b8f71; color: #fff; flex: 1; box-shadow: 0 2px 8px rgba(107,143,113,0.25); }
.btn-primary:hover { background: #5a7d60; }
.btn-secondary { background: #f0ece6; color: #9a9288; }
.btn-secondary:hover { background: #e8e4de; }
.btn-add-new {
  width: 100%; background: #fff; color: #7a9e80;
  border: 1.5px dashed #c8e0cc; font-size: 13px;
  border-radius: 14px; padding: 12px;
}
.btn-add-new:hover { background: #f4faf5; border-color: #7a9e80; transform: translateY(-1px); }
.footer-note { margin-top: 28px; text-align: center; color: #d0c8be; font-size: 11px; }

<body>

<header class="header">
  <div class="header-inner">
    <div>
      <div class="header-label">Repayment</div>
      <div class="header-title">返済チェックシート</div>
    </div>
    <div class="year-selector">
      <button class="year-btn" id="prevYear">‹</button>
      <span class="year-text" id="yearDisplay"></span>
      <button class="year-btn" id="nextYear">›</button>
    </div>
  </div>
</header>

<main>
  <div class="summary-card">
    <div class="summary-ring">
      <svg width="76" height="76" class="ring-svg">
        <circle class="ring-bg" cx="38" cy="38" r="32"/>
        <circle class="ring-fg" id="ringFg" cx="38" cy="38" r="32"
          stroke="#6b8f71" stroke-dasharray="201.06" stroke-dashoffset="201.06"/>
      </svg>
      <div class="ring-label" id="ringLabel">0%</div>
    </div>
    <div class="summary-info">
      <div class="summary-year" id="summaryYear"></div>
      <div class="summary-amount-label">今月の振込済</div>
      <span class="summary-amount-value" id="paidThisMonth">¥0</span>
      <span class="summary-amount-total" id="totalDue"></span>
      <div class="tags" id="tagsArea"></div>
    </div>
  </div>

  <div id="loanCards"></div>

  <div id="addPanel" class="add-panel" style="display:none;">
    <div class="add-panel-title">ローンを追加</div>
    <div class="add-fields">
      <input type="text" id="newName" placeholder="ローン名（例: 奨学金）" />
      <input type="number" id="newAmount" placeholder="月々の返済額（円）" />
      <div class="add-btns">
        <button class="btn btn-primary" id="confirmAdd">追加する</button>
        <button class="btn btn-secondary" id="cancelAdd">キャンセル</button>
      </div>
    </div>
  </div>
  <button class="btn btn-add-new" id="showAddBtn">＋ ローンを追加</button>

  <p class="footer-note">データはこのブラウザに保存されます</p>
</main>

<script>
  const MONTHS = ["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"];
  const CIRCUMFERENCE = 2 * Math.PI * 32;
  const COLORS = ["#7a9e80","#e8a87c","#8fa8d0","#c47f9a","#a07fc4","#d4a852"];
  const DEFAULT_LOANS = [
    { id: 1, name: "住宅ローン", amount: 80000, color: "#7a9e80" },
    { id: 2, name: "カーローン", amount: 25000, color: "#e8a87c" },
    { id: 3, name: "カードローン", amount: 15000, color: "#8fa8d0" },
  ];

  const today = new Date();
  let year = today.getFullYear();
  let loans = [], payments = {};

  function load() {
    try {
      const l = localStorage.getItem("rt_loans");
      const p = localStorage.getItem("rt_payments");
      loans    = l ? JSON.parse(l) : JSON.parse(JSON.stringify(DEFAULT_LOANS));
      payments = p ? JSON.parse(p) : {};
    } catch(e) { loans = JSON.parse(JSON.stringify(DEFAULT_LOANS)); payments = {}; }
  }
  function save() {
    try {
      localStorage.setItem("rt_loans", JSON.stringify(loans));
      localStorage.setItem("rt_payments", JSON.stringify(payments));
    } catch(e) {}
  }

  function key(loanId, y, m) { return `${loanId}-${y}-${m}`; }
  function isPaid(loanId, m) { return !!payments[key(loanId, year, m)]; }
  function paidCount(loanId) { return MONTHS.filter((_, i) => isPaid(loanId, i+1)).length; }

  function render() {
    document.getElementById("yearDisplay").textContent = year;
    renderSummary();
    renderCards();
  }

  function renderSummary() {
    const totalDue = loans.reduce((s,l) => s + l.amount, 0);
    const paidNow  = loans.filter(l => isPaid(l.id, today.getMonth()+1)).reduce((s,l) => s+l.amount, 0);
    const progress = loans.length === 0 ? 0
      : Math.round(loans.reduce((s,l) => s + paidCount(l.id), 0) / (loans.length * 12) * 100);

    document.getElementById("ringFg").style.strokeDashoffset = CIRCUMFERENCE * (1 - progress/100);
    document.getElementById("ringLabel").textContent = progress + "%";
    document.getElementById("summaryYear").textContent = year + "年 年間進捗";
    document.getElementById("paidThisMonth").textContent = "¥" + paidNow.toLocaleString();
    document.getElementById("totalDue").textContent = "合計 ¥" + totalDue.toLocaleString() + " /月";

    const tagsArea = document.getElementById("tagsArea");
    tagsArea.innerHTML = "";
    loans.forEach(l => {
      const span = document.createElement("span");
      span.className = "tag";
      span.style.cssText = `background:${l.color}18;color:${l.color};border:1px solid ${l.color}30;`;
      span.textContent = (isPaid(l.id, today.getMonth()+1) ? "✓ " : "· ") + l.name;
      tagsArea.appendChild(span);
    });
  }

  function renderCards() {
    const container = document.getElementById("loanCards");
    container.innerHTML = "";
    loans.forEach(loan => {
      const pc  = paidCount(loan.id);
      const pct = Math.round(pc / 12 * 100);
      const card = document.createElement("div");
      card.className = "loan-card";

      const header = document.createElement("div");
      header.className = "loan-header";
      const left = document.createElement("div");
      const nameRow = document.createElement("div");
      nameRow.className = "loan-name-row";
      const dot = document.createElement("div");
      dot.className = "loan-dot";
      dot.style.background = loan.color;
      const info = document.createElement("div");
      info.innerHTML = `<div class="loan-name">${loan.name}</div><div class="loan-amount"><span class="loan-amount-value" style="color:${loan.color}">¥${loan.amount.toLocaleString()}</span> /月</div>`;
      nameRow.append(dot, info);
      left.appendChild(nameRow);

      const right = document.createElement("div");
      right.className = "loan-meta";
      const countEl = document.createElement("span");
      countEl.className = "loan-count";
      countEl.id = `count-${loan.id}`;
      countEl.textContent = pc + " / 12ヶ月";
      const removeBtn = document.createElement("button");
      removeBtn.className = "loan-remove";
      removeBtn.textContent = "×";
      removeBtn.onclick = () => { loans = loans.filter(l => l.id !== loan.id); save(); render(); };
      right.append(countEl, removeBtn);
      header.append(left, right);
      card.appendChild(header);

      const grid = document.createElement("div");
      grid.className = "month-grid";
      MONTHS.forEach((m, i) => {
        const month = i + 1;
        const isThisMonth = year === today.getFullYear() && month === today.getMonth()+1;
        const cell = document.createElement("div");
        cell.className = "month-cell";
        const label = document.createElement("div");
        label.className = "month-label";
        label.textContent = m;
        if (isThisMonth) label.style.color = loan.color;
        const btn = document.createElement("button");
        btn.className = "check-btn";
        btn.id = `btn-${loan.id}-${month}`;
        styleBtn(btn, loan, month, isThisMonth);
        btn.onclick = () => toggle(loan.id, month, loan, isThisMonth);
        cell.append(label, btn);
        grid.appendChild(cell);
      });
      card.appendChild(grid);

      const bg = document.createElement("div");
      bg.className = "progress-bg";
      const fill = document.createElement("div");
      fill.className = "progress-fill";
      fill.id = `prog-${loan.id}`;
      fill.style.cssText = `width:${pct}%;background:${loan.color};`;
      bg.appendChild(fill);
      card.appendChild(bg);
      container.appendChild(card);
    });
  }

  function styleBtn(btn, loan, month, isThisMonth) {
    const paid = isPaid(loan.id, month);
    btn.textContent = paid ? "✓" : "";
    btn.style.borderColor = paid ? loan.color : (isThisMonth ? loan.color + "55" : "#e8e4de");
    btn.style.background  = paid ? loan.color + "18" : (isThisMonth ? loan.color + "08" : "#faf9f7");
    btn.style.color       = paid ? loan.color : "#e0dbd3";
  }

  function toggle(loanId, month, loan, isThisMonth) {
    payments[key(loanId, year, month)] = !payments[key(loanId, year, month)];
    save();
    const btn = document.getElementById(`btn-${loanId}-${month}`);
    if (btn) {
      btn.classList.remove("pop");
      void btn.offsetWidth;
      btn.classList.add("pop");
      styleBtn(btn, loan, month, isThisMonth);
      btn.addEventListener("animationend", () => btn.classList.remove("pop"), { once: true });
    }
    const pc = paidCount(loanId);
    const el = document.getElementById(`count-${loanId}`);
    if (el) el.textContent = pc + " / 12ヶ月";
    const fill = document.getElementById(`prog-${loanId}`);
    if (fill) fill.style.width = Math.round(pc / 12 * 100) + "%";
    renderSummary();
  }

  document.getElementById("showAddBtn").onclick = () => {
    document.getElementById("addPanel").style.display = "block";
    document.getElementById("showAddBtn").style.display = "none";
    document.getElementById("newName").focus();
  };
  document.getElementById("cancelAdd").onclick = closeAdd;
  document.getElementById("confirmAdd").onclick = () => {
    const name   = document.getElementById("newName").value.trim();
    const amount = Number(document.getElementById("newAmount").value);
    if (!name || !amount) return;
    loans.push({ id: Date.now(), name, amount, color: COLORS[loans.length % COLORS.length] });
    save(); render(); closeAdd();
  };
  document.getElementById("newName").addEventListener("keydown", e => { if (e.key === "Enter") document.getElementById("newAmount").focus(); });
  document.getElementById("newAmount").addEventListener("keydown", e => { if (e.key === "Enter") document.getElementById("confirmAdd").click(); });
  function closeAdd() {
    document.getElementById("addPanel").style.display = "none";
    document.getElementById("showAddBtn").style.display = "block";
    document.getElementById("newName").value = "";
    document.getElementById("newAmount").value = "";
  }

  document.getElementById("prevYear").onclick = () => { year--; render(); };
  document.getElementById("nextYear").onclick = () => { year++; render(); };

  load();
  render();
</script>

</body>
</html>
