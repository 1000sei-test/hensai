/* Header */
.header-blur {
  background: rgba(14,14,20,0.92);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  position: sticky; top: 0; z-index: 100;
  border-bottom: 1px solid #26263a;
}
.header-inner {
  max-width: 540px; margin: 0 auto;
  padding: 16px 20px;
  display: flex; align-items: center; justify-content: space-between;
}
.header-label {
  font-size: 11px; color: #6366f1; font-weight: 700;
  letter-spacing: 2px; text-transform: uppercase;
  font-family: 'Space Mono', monospace;
}
.header-title { font-size: 20px; font-weight: 700; margin-top: 2px; }
.year-selector {
  display: flex; align-items: center; gap: 8px;
  background: #1a1a28; border-radius: 10px; padding: 6px 12px;
}
.year-btn {
  background: none; border: none; color: #888;
  cursor: pointer; font-size: 20px; line-height: 1; padding: 0 2px;
}
.year-btn:hover { color: #ccc; }
.year-text {
  font-family: 'Space Mono', monospace; font-weight: 700;
  font-size: 15px; min-width: 42px; text-align: center; color: #f0f0f5;
}

/* Main */
main { max-width: 540px; margin: 0 auto; padding: 20px 16px; }

/* Summary card */
.summary-card {
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
  border: 1px solid #26264a; border-radius: 20px;
  padding: 20px; margin-bottom: 20px;
  display: flex; align-items: center; gap: 20px;
}
.summary-ring { position: relative; display: inline-flex; align-items: center; justify-content: center; }
.ring-svg { transform: rotate(-90deg); }
.ring-bg { fill: none; stroke: #26263a; stroke-width: 6; }
.ring-fg { fill: none; stroke-width: 6; stroke-linecap: round; transition: stroke-dashoffset 0.7s ease; }
.ring-label {
  position: absolute; text-align: center;
  font-family: 'Space Mono', monospace; font-weight: 700; font-size: 15px;
}
.summary-info { flex: 1; }
.summary-year { color: #888; font-size: 12px; margin-bottom: 4px; }
.summary-amount-row { font-size: 13px; margin-bottom: 12px; }
.summary-amount-label { color: #a5b4fc; }
.summary-amount-value {
  font-family: 'Space Mono', monospace; font-weight: 700;
  font-size: 18px; margin-left: 8px;
}
.summary-amount-total { color: #555; font-size: 12px; margin-left: 4px; }
.tags { display: flex; gap: 6px; flex-wrap: wrap; }
.tag {
  display: inline-block; padding: 2px 10px; border-radius: 20px;
  font-size: 11px; font-weight: 700; letter-spacing: 0.8px;
  font-family: 'Space Mono', monospace;
}

/* Loan card */
.loan-card {
  background: #16161f; border-radius: 16px;
  padding: 20px 20px 16px; margin-bottom: 12px;
  border: 1px solid #26263a; transition: border-color 0.2s;
}
.loan-card:hover { border-color: #3a3a5a; }
.loan-header {
  display: flex; justify-content: space-between;
  align-items: flex-start; margin-bottom: 14px;
}
.loan-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.loan-name-row { display: flex; align-items: center; gap: 8px; }
.loan-name { font-weight: 700; font-size: 15px; }
.loan-amount {
  font-family: 'Space Mono', monospace; font-size: 14px;
  font-weight: 700; margin-top: 3px; padding-left: 18px;
}
.loan-amount-unit { color: #555; font-size: 11px; font-weight: 400; }
.loan-meta { display: flex; align-items: center; gap: 8px; }
.loan-count { font-family: 'Space Mono', monospace; font-size: 12px; color: #888; }
.loan-remove {
  background: none; border: none; color: #444;
  cursor: pointer; font-size: 20px; line-height: 1; padding: 2px 4px;
}
.loan-remove:hover { color: #e85d8a; }

/* Month grid */
.month-grid {
  display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px;
}
.month-cell { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.month-label { font-size: 11px; letter-spacing: 0.5px; }
.check-btn {
  width: 40px; height: 40px; border-radius: 10px; border: 2px solid;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 18px; background: transparent; flex-shrink: 0;
  transition: all 0.18s cubic-bezier(0.34,1.56,0.64,1);
}
.check-btn:hover { transform: scale(1.15); }
.check-btn.pop { animation: pop 0.38s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes pop {
  0%   { transform: scale(1); }
  50%  { transform: scale(1.4); }
  100% { transform: scale(1); }
}

/* Progress bar */
.progress-bg {
  background: #26263a; border-radius: 4px; height: 4px;
  width: 100%; margin-top: 10px;
}
.progress-fill { height: 4px; border-radius: 4px; transition: width 0.5s ease; }

/* Add loan panel */
.add-panel {
  background: #16161f; border: 1px solid #6366f166;
  border-radius: 16px; padding: 20px; margin-bottom: 12px;
}
.add-panel-title { font-weight: 700; margin-bottom: 14px; }
.add-fields { display: flex; flex-direction: column; gap: 10px; }
.add-fields input {
  background: #1e1e2e; border: 1px solid #3a3a54; border-radius: 8px;
  color: #f0f0f5; padding: 10px 14px; font-size: 14px;
  font-family: inherit; outline: none; width: 100%;
  transition: border-color 0.2s;
}
.add-fields input:focus { border-color: #6366f1; }
.add-btns { display: flex; gap: 8px; }
.btn {
  border: none; border-radius: 10px; padding: 10px 20px;
  font-size: 14px; font-weight: 700; cursor: pointer;
  font-family: inherit; transition: all 0.18s;
}
.btn:hover { opacity: 0.85; transform: translateY(-1px); }
.btn:active { transform: translateY(0); }
.btn-primary { background: #6366f1; color: #fff; flex: 1; }
.btn-secondary { background: #26263a; color: #888; }
.btn-add-new {
  width: 100%; background: #1a1a28; color: #6366f1;
  border: 2px dashed #6366f144; font-size: 14px;
}
.footer-note {
  margin-top: 24px; text-align: center; color: #333;
  font-size: 11px; font-family: 'Space Mono', monospace;
}

<body>

<header class="header-blur">
  <div class="header-inner">
    <div>
      <div class="header-label">返済管理</div>
      <div class="header-title">チェックシート</div>
    </div>
    <div class="year-selector">
      <button class="year-btn" id="prevYear">‹</button>
      <span class="year-text" id="yearDisplay"></span>
      <button class="year-btn" id="nextYear">›</button>
    </div>
  </div>
</header>

<main>
  <!-- Summary -->
  <div class="summary-card">
    <div class="summary-ring">
      <svg width="80" height="80" class="ring-svg">
        <circle class="ring-bg" cx="40" cy="40" r="34"/>
        <circle class="ring-fg" id="ringFg" cx="40" cy="40" r="34" stroke="#6366f1"
          stroke-dasharray="213.63" stroke-dashoffset="213.63"/>
      </svg>
      <div class="ring-label" id="ringLabel">0%</div>
    </div>
    <div class="summary-info">
      <div class="summary-year" id="summaryYear"></div>
      <div class="summary-amount-row">
        <span class="summary-amount-label">今月の振込済</span>
        <span class="summary-amount-value" id="paidThisMonth">¥0</span>
        <span class="summary-amount-total" id="totalDue"></span>
      </div>
      <div class="tags" id="tagsArea"></div>
    </div>
  </div>

  <!-- Loan cards -->

  <div id="loanCards"></div>

  <!-- Add loan -->

  <div id="addPanel" class="add-panel" style="display:none;">
    <div class="add-panel-title">ローンを追加</div>
    <div class="add-fields">
      <input type="text" id="newName" placeholder="ローン名（例: 奨学金）" />
      <input type="number" id="newAmount" placeholder="月々の返済額（円）" />
      <div class="add-btns">
        <button class="btn btn-primary" id="confirmAdd">追加する</button>
        <button class="btn btn-secondary" id="cancelAdd">キャンセル</button>
      </div>
    </div>
  </div>
  <button class="btn btn-add-new" id="showAddBtn">＋ ローンを追加</button>

  <p class="footer-note">データはこのブラウザに保存されます</p>
</main>

<script>
  // ── Constants ──────────────────────────────────────
  const MONTHS = ["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"];
  const CIRCUMFERENCE = 2 * Math.PI * 34;
  const EXTRA_COLORS = ["#e85d8a","#a855f7","#06b6d4","#eab308","#f97316"];
  const DEFAULT_LOANS = [
    { id: 1, name: "住宅ローン", amount: 80000, color: "#4f8ef7" },
    { id: 2, name: "カーローン", amount: 25000, color: "#f77b4f" },
    { id: 3, name: "カードローン", amount: 15000, color: "#4fcf8e" },
  ];

  const today = new Date();
  let year = today.getFullYear();
  let loans = [];
  let payments = {};

  // ── Persist ────────────────────────────────────────
  function load() {
    try {
      const l = localStorage.getItem("rt_loans");
      const p = localStorage.getItem("rt_payments");
      loans    = l ? JSON.parse(l) : JSON.parse(JSON.stringify(DEFAULT_LOANS));
      payments = p ? JSON.parse(p) : {};
    } catch(e) {
      loans = JSON.parse(JSON.stringify(DEFAULT_LOANS));
      payments = {};
    }
  }
  function save() {
    try {
      localStorage.setItem("rt_loans", JSON.stringify(loans));
      localStorage.setItem("rt_payments", JSON.stringify(payments));
    } catch(e) {}
  }

  // ── Helpers ────────────────────────────────────────
  function key(loanId, y, m) { return `${loanId}-${y}-${m}`; }
  function isPaid(loanId, m) { return !!payments[key(loanId, year, m)]; }
  function paidCount(loanId) { return MONTHS.filter((_, i) => isPaid(loanId, i+1)).length; }

  // ── Render ─────────────────────────────────────────
  function render() {
    renderHeader();
    renderSummary();
    renderCards();
  }

  function renderHeader() {
    document.getElementById("yearDisplay").textContent = year;
  }

  function renderSummary() {
    const totalDue = loans.reduce((s,l) => s + l.amount, 0);
    const paidNow  = loans.filter(l => isPaid(l.id, today.getMonth()+1)).reduce((s,l) => s+l.amount, 0);
    const progress = loans.length === 0 ? 0
      : Math.round(loans.reduce((s,l) => s + paidCount(l.id), 0) / (loans.length * 12) * 100);

    document.getElementById("ringFg").style.strokeDashoffset =
      CIRCUMFERENCE * (1 - progress / 100);
    document.getElementById("ringLabel").textContent = progress + "%";
    document.getElementById("summaryYear").textContent = year + "年 年間進捗";
    document.getElementById("paidThisMonth").textContent = "¥" + paidNow.toLocaleString();
    document.getElementById("totalDue").textContent = "/ ¥" + totalDue.toLocaleString();

    const tagsArea = document.getElementById("tagsArea");
    tagsArea.innerHTML = "";
    loans.forEach(l => {
      const span = document.createElement("span");
      span.className = "tag";
      span.style.cssText = `background:${l.color}22;color:${l.color};border:1px solid ${l.color}44;`;
      span.textContent = (isPaid(l.id, today.getMonth()+1) ? "✓" : "–") + " " + l.name;
      tagsArea.appendChild(span);
    });
  }

  function renderCards() {
    const container = document.getElementById("loanCards");
    container.innerHTML = "";
    loans.forEach(loan => {
      const pc  = paidCount(loan.id);
      const pct = Math.round(pc / 12 * 100);
      const card = document.createElement("div");
      card.className = "loan-card";

      // Header
      const header = document.createElement("div");
      header.className = "loan-header";

      const left = document.createElement("div");
      const nameRow = document.createElement("div");
      nameRow.className = "loan-name-row";
      const dot = document.createElement("div");
      dot.className = "loan-dot";
      dot.style.background = loan.color;
      const nameEl = document.createElement("span");
      nameEl.className = "loan-name";
      nameEl.textContent = loan.name;
      nameRow.append(dot, nameEl);
      const amountEl = document.createElement("div");
      amountEl.className = "loan-amount";
      amountEl.style.color = loan.color;
      amountEl.innerHTML = `¥${loan.amount.toLocaleString()} <span class="loan-amount-unit">/月</span>`;
      left.append(nameRow, amountEl);

      const right = document.createElement("div");
      right.className = "loan-meta";
      const countEl = document.createElement("span");
      countEl.className = "loan-count";
      countEl.textContent = pc + "/12";
      countEl.id = `count-${loan.id}`;
      const removeBtn = document.createElement("button");
      removeBtn.className = "loan-remove";
      removeBtn.textContent = "×";
      removeBtn.setAttribute("aria-label", loan.name + "を削除");
      removeBtn.onclick = () => { loans = loans.filter(l => l.id !== loan.id); save(); render(); };
      right.append(countEl, removeBtn);
      header.append(left, right);
      card.appendChild(header);

      // Month grid
      const grid = document.createElement("div");
      grid.className = "month-grid";
      MONTHS.forEach((m, i) => {
        const month = i + 1;
        const isThisMonth = year === today.getFullYear() && month === today.getMonth()+1;
        const cell = document.createElement("div");
        cell.className = "month-cell";
        const label = document.createElement("div");
        label.className = "month-label";
        label.textContent = m;
        label.style.color = isThisMonth ? loan.color : "#666";
        const btn = document.createElement("button");
        btn.className = "check-btn";
        btn.id = `btn-${loan.id}-${month}`;
        btn.setAttribute("aria-pressed", isPaid(loan.id, month));
        btn.setAttribute("aria-label", m + "の" + loan.name);
        styleCheckBtn(btn, loan, month, isThisMonth);
        btn.onclick = () => togglePayment(loan.id, month, loan, isThisMonth);
        cell.append(label, btn);
        grid.appendChild(cell);
      });
      card.appendChild(grid);

      // Progress bar
      const bg = document.createElement("div");
      bg.className = "progress-bg";
      const fill = document.createElement("div");
      fill.className = "progress-fill";
      fill.id = `prog-${loan.id}`;
      fill.style.cssText = `width:${pct}%;background:${loan.color};`;
      bg.appendChild(fill);
      card.appendChild(bg);
      container.appendChild(card);
    });
  }

  function styleCheckBtn(btn, loan, month, isThisMonth) {
    const paid = isPaid(loan.id, month);
    btn.textContent = paid ? "✓" : "";
    btn.style.borderColor  = paid ? loan.color : "#2e2e44";
    btn.style.background   = paid ? loan.color + "28" : "transparent";
    btn.style.color        = paid ? loan.color : "#3a3a54";
    btn.style.outline      = (isThisMonth && !paid) ? `2px solid ${loan.color}55` : "none";
    btn.style.outlineOffset = "2px";
    btn.setAttribute("aria-pressed", paid);
  }

  function togglePayment(loanId, month, loan, isThisMonth) {
    const k = key(loanId, year, month);
    payments[k] = !payments[k];
    save();

    // Update only affected elements (no full re-render for snappy feel)
    const btn = document.getElementById(`btn-${loanId}-${month}`);
    if (btn) {
      btn.classList.remove("pop");
      void btn.offsetWidth; // reflow
      btn.classList.add("pop");
      styleCheckBtn(btn, loan, month, isThisMonth);
      btn.addEventListener("animationend", () => btn.classList.remove("pop"), { once: true });
    }
    const pc = paidCount(loanId);
    const countEl = document.getElementById(`count-${loanId}`);
    if (countEl) countEl.textContent = pc + "/12";
    const fill = document.getElementById(`prog-${loanId}`);
    if (fill) fill.style.width = Math.round(pc / 12 * 100) + "%";
    renderSummary();
  }

  // ── Add loan ───────────────────────────────────────
  document.getElementById("showAddBtn").onclick = () => {
    document.getElementById("addPanel").style.display = "block";
    document.getElementById("showAddBtn").style.display = "none";
    document.getElementById("newName").focus();
  };
  document.getElementById("cancelAdd").onclick = closeAddPanel;
  document.getElementById("confirmAdd").onclick = () => {
    const name   = document.getElementById("newName").value.trim();
    const amount = Number(document.getElementById("newAmount").value);
    if (!name || !amount) return;
    const color = EXTRA_COLORS[loans.length % EXTRA_COLORS.length];
    loans.push({ id: Date.now(), name, amount, color });
    save();
    render();
    closeAddPanel();
  };
  document.getElementById("newName").addEventListener("keydown", e => {
    if (e.key === "Enter") document.getElementById("newAmount").focus();
  });
  document.getElementById("newAmount").addEventListener("keydown", e => {
    if (e.key === "Enter") document.getElementById("confirmAdd").click();
  });
  function closeAddPanel() {
    document.getElementById("addPanel").style.display = "none";
    document.getElementById("showAddBtn").style.display = "block";
    document.getElementById("newName").value = "";
    document.getElementById("newAmount").value = "";
  }

  // ── Year navigation ────────────────────────────────
  document.getElementById("prevYear").onclick = () => { year--; render(); };
  document.getElementById("nextYear").onclick = () => { year++; render(); };

  // ── Init ───────────────────────────────────────────
  load();
  render();
</script>

</body>
</html>
